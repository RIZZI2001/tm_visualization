<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TM_VIZUALIZER</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="./color_palette.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header id="header">
    <div class="header-content">
      <h1>TM Visualizer</h1>
      <div class="header-buttons">
        <button id="options-btn" class="header-btn">⚙️ Options</button>
        <button id="menu-btn" class="header-btn">☰ Menu</button>
      </div>
    </div>
  </header>
  
  <div class="main-container">
    <!-- Left Sidebar -->
    <div id="left-panel" class="panel left-panel">
      <div class="panel-content">
        <h3>Left Panel</h3>
        <p>Filters and options go here</p>
      </div>
    </div>

    <!-- Left Handle -->
    <div class="left-handle panel-handle">▶</div>

    <!-- Main Chart Area -->
    <div id="chart-container" class="chart-container">
      <!-- Row 1 -->
      <div id="toggle-section" class="chart-cell">
        <button id="toggle-btn" class="header-btn">Toggle</button>
      </div>
      <div id="slider-section" class="chart-cell">
        <input type="range" id="main-slider" min="0" max="100" value="50" style="width: 100%;">
      </div>

      <!-- Row 2 -->
      <div id="labels-section" class="chart-cell">
        Labels
      </div>
      <div id="heatmap-section" class="chart-cell">
        <!-- Heatmap will be inserted here -->
      </div>

      <!-- Row 3 -->
      <div id="legend-section" class="chart-cell">
        Legend
      </div>
      <div id="timescale-section" class="chart-cell">
        Time Scale
      </div>

      <!-- Row 4 -->
      <div id="dropdowns-section" class="chart-cell">
        <select id="dropdown1" class="header-btn" style="width: 100%;">
          <option>Option 1</option>
          <option>Option 2</option>
        </select>
        <select id="dropdown2" class="header-btn" style="width: 100%;">
          <option>Option A</option>
          <option>Option B</option>
        </select>
      </div>
      <div id="linegraph-section" class="chart-cell">
        Line Graph
      </div>
    </div>

    <!-- Right Handle -->
    <div class="right-handle panel-handle">◀</div>

    <!-- Right Sidebar -->
    <div id="right-panel" class="panel right-panel">
      <div class="panel-content">
        <h3>Right Panel</h3>
        <p>Info and details go here</p>
      </div>
    </div>
  </div>

  <script src="./main_screen_viz.js"></script>
  <script src="./app.js"></script>
  <script src="./sidebar.js"></script>
</body>
</html>
